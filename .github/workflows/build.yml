name: Build Go Binary

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/devkit .

      - name: Verify binary
        run: ./bin/devkit version